<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ثبت‌نام در آینده‌سازان و شروع چالش معاملاتی" />
  <title>ثبت‌نام | آینده‌سازان</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js"></script>
</head>
<body>

  <div id="site-header"></div>
  <script>initHeader('signup');</script>

  <div class="auth-shell">
    <div class="wrap" style="padding:0">
      <div class="eyebrow" style="justify-content:center">ایجاد حساب</div>
      <h1 style="text-align:center;font-size:1.7rem;margin-bottom:28px">ساخت حساب کاربری</h1>

      <div class="auth-card">
        <form id="signupForm">
          <div class="field">
            <label for="fullname">نام و نام خانوادگی</label>
            <input type="text" id="fullname" required placeholder="مثلاً علی محمدی" />
          </div>
          <div class="field">
            <label for="email">ایمیل</label>
            <input type="email" id="email" required placeholder="you@example.com" />
          </div>
          <div class="field">
            <label for="password">رمز عبور</label>
            <input type="password" id="password" required minlength="8" placeholder="حداقل ۸ کاراکتر" />
          </div>
          <div class="field">
            <label for="password2">تکرار رمز عبور</label>
            <input type="password" id="password2" required minlength="8" placeholder="تکرار رمز عبور" />
            <div class="field-hint"></div>
          </div>
          <button type="submit" class="btn btn-gold btn-block">ساخت حساب</button>
          <div class="form-msg" id="signupMsg">حساب شما با موفقیت ساخته شد. در حال انتقال به صفحه پرداخت...</div>
        </form>
      </div>
      <p class="form-note">قبلاً حساب ساخته‌اید؟ <a href="login.html">وارد شوید</a></p>
    </div>
  </div>

  <div id="site-footer"></div>
  <script>initFooter();</script>

</body>
</html>
