<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ورود به حساب کاربری آینده‌سازان" />
  <title>ورود | آینده‌سازان</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js"></script>
</head>
<body>

  <div id="site-header"></div>
  <script>initHeader('login');</script>

  <div class="auth-shell">
    <div class="wrap" style="padding:0">
      <div class="eyebrow" style="justify-content:center">خوش آمدید</div>
      <h1 style="text-align:center;font-size:1.7rem;margin-bottom:28px">ورود به حساب کاربری</h1>

      <div class="auth-card">
        <form id="loginForm">
          <div class="field">
            <label for="lemail">ایمیل</label>
            <input type="email" id="lemail" required placeholder="you@example.com" />
          </div>
          <div class="field">
            <label for="lpassword">رمز عبور</label>
            <input type="password" id="lpassword" required placeholder="رمز عبور" />
            <div class="field-hint"><a href="#" style="color:var(--gold)">رمز عبور را فراموش کرده‌اید؟</a></div>
          </div>
          <button type="submit" class="btn btn-gold btn-block">ورود</button>
          <div class="form-msg" id="loginMsg">ورود با موفقیت انجام شد. در حال انتقال به داشبورد...</div>
        </form>
      </div>
      <p class="form-note">حساب کاربری ندارید؟ <a href="signup.html">ثبت‌نام کنید</a></p>
    </div>
  </div>

  <div id="site-footer"></div>
  <script>initFooter();</script>

</body>
</html>s
